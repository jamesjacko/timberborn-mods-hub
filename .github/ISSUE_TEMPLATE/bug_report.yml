name: Bug report
description: Something isn't working right in one of the mods
labels: [bug]
body:
  - type: dropdown
    id: mod
    attributes:
      label: Which mod?
      options:
        - Grid Cutting Patterns
        - Growth & Harvest Heatmap
        - Pattern Planting
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
  - type: input
    id: gameversion
    attributes:
      label: Timberborn version
      placeholder: e.g. 1.0.x.x
  - type: textarea
    id: log
    attributes:
      label: Player.log (optional, very helpful)
      description: "macOS: ~/Library/Logs/Mechanistry/Timberborn/Player.log — Windows: %USERPROFILE%\\AppData\\LocalLow\\Mechanistry\\Timberborn\\Player.log"
      render: text
  - type: input
    id: othermods
    attributes:
      label: Other mods enabled (optional)
      description: Load-order clashes are a common cause — list any other mods if relevant.
